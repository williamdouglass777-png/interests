<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Things That Interest Me</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: #f5f0e8; font-family: 'Cormorant Garamond', Georgia, serif; padding: 48px 24px 64px; color: #1a1a1a; }
    .container { max-width: 640px; margin: 0 auto; }
    .meta { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: #999; margin-bottom: 20px; text-transform: uppercase; }
    h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(44px, 9vw, 76px); line-height: 1.0; letter-spacing: -0.02em; color: #1a1a1a; }
    h1 em { font-style: italic; }
    .rule { margin-top: 28px; width: 40px; height: 1px; background: #1a1a1a; margin-bottom: 20px; }
    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .edit-hint { font-family: 'DM Mono', monospace; font-size: 9px; color: #ccc; letter-spacing: 0.1em; text-transform: uppercase; }
    .status { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.3s; }
    .status.saving { color: #aaa; }
    .status.saved { color: #bbb; }
    .status.error { color: #c97a7a; }
    .status.loading { color: #ccc; }
    .cat-row { display: grid; grid-template-columns: 56px 1fr; align-items: start; border-top: 1px solid #c8bfb0; padding: 18px 0; cursor: pointer; transition: background 0.2s; }
    .cat-row:hover { background: rgba(0,0,0,0.02); }
    .cat-row.last { border-bottom: 1px solid #c8bfb0; }
    .cat-num { font-family: 'DM Mono', monospace; font-size: 10px; color: #bbb; letter-spacing: 0.08em; padding-top: 4px; display: flex; align-items: center; gap: 10px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; border: 1px solid #999; background: transparent; transition: background 0.2s; flex-shrink: 0; }
    .dot.active { background: #1a1a1a; }
    .cat-header { display: flex; justify-content: space-between; align-items: baseline; }
    .cat-label-wrap { display: flex; align-items: baseline; gap: 4px; }
    .cat-label { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 21px; letter-spacing: 0.01em; outline: none; border: none; background: transparent; color: #1a1a1a; cursor: text; min-width: 40px; }
    .cat-label.active { font-weight: 600; }
    .cat-label:focus { border-bottom: 1px solid #c8bfb0; }
    .cat-meta { display: flex; align-items: center; gap: 10px; }
    .cat-count { font-family: 'DM Mono', monospace; font-size: 10px; color: #bbb; }
    .chevron { font-family: Georgia, serif; font-size: 14px; color: #999; display: inline-block; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); line-height: 1; }
    .chevron.open { transform: rotate(90deg); }
    .del-cat-btn { opacity: 0; transition: opacity 0.15s; background: none; border: none; cursor: pointer; color: #ccc; font-size: 11px; font-family: 'DM Mono', monospace; line-height: 1; padding: 2px 5px; letter-spacing: 0.05em; }
    .cat-label-wrap:hover .del-cat-btn { opacity: 1; }
    .del-cat-btn:hover { color: #888; }
    .confirm-box { background: #f5f0e8; border: 1px solid #c8bfb0; padding: 32px 36px; max-width: 340px; width: 90%; }
    .confirm-box p { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: #1a1a1a; margin-bottom: 8px; }
    .confirm-box small { font-family: 'DM Mono', monospace; font-size: 9px; color: #aaa; letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 24px; }
    .confirm-actions { display: flex; gap: 12px; }
    .confirm-cancel { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; background: none; border: 1px solid #c8bfb0; color: #888; padding: 9px 18px; cursor: pointer; flex: 1; }
    .confirm-cancel:hover { border-color: #a09890; }
    .confirm-delete { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; background: #1a1a1a; border: 1px solid #1a1a1a; color: #f5f0e8; padding: 9px 18px; cursor: pointer; flex: 1; }
    .confirm-delete:hover { background: #333; }
    .item-list { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease; }
    .item-list.open { max-height: 800px; opacity: 1; }
    .item-list-inner { padding-top: 14px; padding-bottom: 2px; }
    .item-row { display: flex; align-items: baseline; gap: 12px; padding: 6px 0; border-bottom: 1px solid #e5ddd3; }
    .item-row:last-of-type { border-bottom: none; }
    .item-num { font-family: 'DM Mono', monospace; font-size: 9px; color: #ccc; flex-shrink: 0; }
    .item-text { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-style: italic; font-weight: 300; color: #666; flex-grow: 1; background: transparent; border: none; outline: none; cursor: text; min-width: 60px; width: 100%; }
    .item-text:focus { border-bottom: 1px solid #c8bfb0; color: #444; }
    .del-item-btn { opacity: 0; transition: opacity 0.15s; background: none; border: none; cursor: pointer; color: #bbb; font-size: 12px; font-family: 'DM Mono', monospace; padding: 0 2px; line-height: 1; flex-shrink: 0; }
    .item-row:hover .del-item-btn { opacity: 1; }
    .del-item-btn:hover { color: #888; }
    .add-item-btn { background: none; border: none; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 9px; color: #bbb; letter-spacing: 0.15em; text-transform: uppercase; padding: 10px 0 4px; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
    .add-item-btn:hover { color: #888; }
    .add-item-row { display: flex; align-items: baseline; gap: 12px; padding: 6px 0; border-top: 1px solid #e5ddd3; }
    .new-item-input { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-style: italic; font-weight: 300; color: #444; background: transparent; border: none; border-bottom: 1px solid #c8bfb0; outline: none; flex-grow: 1; padding: 0; }
    .new-item-input::placeholder { color: #ccc; }
    .add-cat-btn { background: none; border: 1px dashed #c8bfb0; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 9px; color: #bbb; letter-spacing: 0.15em; text-transform: uppercase; padding: 12px 20px; width: 100%; margin-top: 12px; transition: border-color 0.15s, color 0.15s; }
    .add-cat-btn:hover { border-color: #a09890; color: #888; }
    .footer { margin-top: 40px; display: flex; justify-content: space-between; align-items: center; }
    .footer-left { font-family: 'DM Mono', monospace; font-size: 9px; color: #ccc; letter-spacing: 0.15em; text-transform: uppercase; }
    .footer-right { font-family: 'Cormorant Garamond', serif; font-size: 13px; font-style: italic; color: #bbb; }
    .loading-screen { padding: 60px 0; font-family: 'DM Mono', monospace; font-size: 10px; color: #ccc; letter-spacing: 0.2em; text-transform: uppercase; }
  </style>
</head>
<body>

<div id="confirm-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(245,240,232,0.88); z-index:9999; align-items:center; justify-content:center; backdrop-filter:blur(3px);">
  <div class="confirm-box">
    <p>Delete this category?</p>
    <small id="confirm-label">—</small>
    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-delete" id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="meta" id="meta">Personal Index</div>
  <h1>Things That<br /><em>Interest Me</em></h1>
  <div class="rule"></div>
  <div class="toolbar">
    <div class="edit-hint">Click any label or item to edit · × to delete · + to add</div>
    <span class="status loading" id="status">Loading…</span>
  </div>
  <div id="cat-list"><div class="loading-screen">Loading…</div></div>
  <button class="add-cat-btn" onclick="addCategory()">+ Add category</button>
  <div class="footer">
    <span class="footer-left" id="footer-left">—</span>
    <span class="footer-right">a partial portrait</span>
  </div>
</div>

<script>
  const SUPABASE_URL      = "https://mofbgslzyssfsxifqixs.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_d5PlNn4UKuNbNijlpXEzOg_nYy3gr9a";
  const TABLE = "categories";

  const baseHeaders = {
    "Content-Type": "application/json",
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
  };

  const defaultCategories = [
    { label: "Consumables",    items: ["Diet Coke", "Blue Moon", "Drunk cigarettes", "Nicotine", "Monk Fruit Redbull", "Drizzalicious"] },
    { label: "Games & Tech",   items: ["Minecraft", "Elden Ring", "Lies of P", "PAX", "Computer specs", "Kick streamers (why?)"] },
    { label: "Film & Music",   items: ["Wes Anderson", "Fargo", "Paris, Texas", "Dominic Fike", "Beabadoobee", "Brockhampton", "Fakemink", "EsDeeKid", "The Drama", "Geese", "I Write Sins Not Tragedies"] },
    { label: "Body & Self",    items: ["Improving looks", "Fixing my hair", "Upper Body day", "Feeling my chest muscles", "Popping my back", "Optimizing lifestyle"] },
    { label: "Aesthetic",      items: ["Traditional tattoos", "High fashion", "Interior Design", "Leather couches", "Small lamps", "French English accents"] },
    { label: "Vibes & Feeling",items: ["Sun after winter", "When dogs lean into me", "Sleeping in", "Remaining calm in tense situations", "Patient people", "Listening to people talk about special interests", "Using words I just barely learned", "Hope for the future"] },
    { label: "Sports",         items: ["Basketball"] },
  ];

  let categories = [];
  let activeId = null;
  let saveTimer = null;

  // ── API ────────────────────────────────────────────────────────────
  async function dbLoad() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*`, { headers: baseHeaders });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function dbInsert(data) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
      method: "POST",
      headers: { ...baseHeaders, "Prefer": "return=representation" },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
    return (await res.json())[0];
  }

  async function dbPatch(id, data) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${id}`, {
      method: "PATCH",
      headers: { ...baseHeaders, "Prefer": "return=minimal" },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
  }

  async function dbDelete(id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${id}`, {
      method: "DELETE", headers: baseHeaders,
    });
    if (!res.ok) throw new Error(await res.text());
  }

  // ── Sort by item count ─────────────────────────────────────────────
  function sortCategories() {
    categories.sort((a, b) => b.items.length - a.items.length);
  }

  // ── Status ─────────────────────────────────────────────────────────
  function setStatus(state, text) {
    const el = document.getElementById("status");
    el.className = `status ${state}`;
    el.textContent = text;
  }

  function scheduleSave(fn) {
    setStatus("saving", "Saving…");
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try { await fn(); setStatus("saved", "Saved"); }
      catch (e) { console.error(e); setStatus("error", "Save failed"); }
    }, 700);
  }

  // ── Seed if empty ──────────────────────────────────────────────────
  async function seedIfEmpty(rows) {
    if (rows.length > 0) return rows;
    setStatus("saving", "Setting up…");
    const seeded = [];
    for (let i = 0; i < defaultCategories.length; i++) {
      const row = await dbInsert({ label: defaultCategories[i].label, items: defaultCategories[i].items, sort_order: i });
      seeded.push(row);
    }
    return seeded;
  }

  // ── Load ───────────────────────────────────────────────────────────
  async function loadData() {
    setStatus("loading", "Loading…");
    try {
      let rows = await dbLoad();
      rows = await seedIfEmpty(rows);
      categories = rows.map(r => ({ id: r.id, label: r.label, items: Array.isArray(r.items) ? r.items : [] }));
      sortCategories();
      render();
      setStatus("saved", "Saved");
    } catch (e) {
      console.error(e);
      setStatus("error", "Connection error");
      document.getElementById("cat-list").innerHTML = `<div class="loading-screen" style="color:#c97a7a">Could not connect.</div>`;
    }
  }

  // ── Meta ───────────────────────────────────────────────────────────
  function updateMeta() {
    const total = categories.reduce((a, c) => a + c.items.length, 0);
    document.getElementById("meta").textContent = `Personal Index — ${total} entries`;
    document.getElementById("footer-left").textContent = `${categories.length} categories`;
  }

  // ── Render ─────────────────────────────────────────────────────────
  function render() {
    sortCategories();
    const list = document.getElementById("cat-list");
    list.innerHTML = "";

    categories.forEach((cat, ci) => {
      const isActive = activeId === cat.id;
      const row = document.createElement("div");
      row.className = "cat-row" + (ci === categories.length - 1 ? " last" : "");

      const left = document.createElement("div");
      left.className = "cat-num";
      left.innerHTML = `<span>${String(ci + 1).padStart(2, "0")}</span><div class="dot${isActive ? " active" : ""}"></div>`;

      const right = document.createElement("div");
      const header = document.createElement("div");
      header.className = "cat-header";

      const labelWrap = document.createElement("div");
      labelWrap.className = "cat-label-wrap";

      const labelInput = document.createElement("input");
      labelInput.className = "cat-label" + (isActive ? " active" : "");
      labelInput.value = cat.label;
      labelInput.onclick = e => e.stopPropagation();
      labelInput.style.width = Math.max(60, cat.label.length * 13) + "px";
      labelInput.oninput = e => { e.target.style.width = Math.max(60, e.target.value.length * 13) + "px"; };
      labelInput.onchange = e => {
        cat.label = e.target.value;
        updateMeta();
        scheduleSave(() => dbPatch(cat.id, { label: cat.label }));
      };

      const delCatBtn = document.createElement("button");
      delCatBtn.className = "del-cat-btn";
      delCatBtn.textContent = "Delete";
      delCatBtn.onclick = e => {
        e.stopPropagation();
        showConfirm(cat.label, () => {
          const id = cat.id;
          categories = categories.filter(c => c.id !== id);
          if (activeId === id) activeId = null;
          render(); updateMeta();
          scheduleSave(() => dbDelete(id));
        });
      };

      labelWrap.appendChild(labelInput);
      labelWrap.appendChild(delCatBtn);

      const metaDiv = document.createElement("div");
      metaDiv.className = "cat-meta";
      metaDiv.innerHTML = `<span class="cat-count">${cat.items.length}</span><span class="chevron${isActive ? " open" : ""}">›</span>`;

      header.appendChild(labelWrap);
      header.appendChild(metaDiv);

      const itemList = document.createElement("div");
      itemList.className = "item-list" + (isActive ? " open" : "");
      const inner = document.createElement("div");
      inner.className = "item-list-inner";
      inner.onclick = e => e.stopPropagation();

      cat.items.forEach((item, j) => {
        const itemRow = document.createElement("div");
        itemRow.className = "item-row";

        const numSpan = document.createElement("span");
        numSpan.className = "item-num";
        numSpan.textContent = String(j + 1).padStart(2, "0");

        const itemInput = document.createElement("input");
        itemInput.className = "item-text";
        itemInput.value = item;
        itemInput.onchange = e => {
          const val = e.target.value.trim();
          if (!val) { cat.items.splice(j, 1); }
          else { cat.items[j] = val; }
          render(); updateMeta();
          scheduleSave(() => dbPatch(cat.id, { items: cat.items }));
        };

        const delBtn = document.createElement("button");
        delBtn.className = "del-item-btn";
        delBtn.textContent = "×";
        delBtn.onclick = () => {
          cat.items.splice(j, 1);
          render(); updateMeta();
          scheduleSave(() => dbPatch(cat.id, { items: cat.items }));
        };

        itemRow.appendChild(numSpan);
        itemRow.appendChild(itemInput);
        itemRow.appendChild(delBtn);
        inner.appendChild(itemRow);
      });

      const addBtn = document.createElement("button");
      addBtn.className = "add-item-btn";
      addBtn.innerHTML = "<span style='font-size:11px'>+</span> Add item";
      addBtn.onclick = () => {
        addBtn.style.display = "none";
        const addRow = document.createElement("div");
        addRow.className = "add-item-row";
        const numSpan = document.createElement("span");
        numSpan.className = "item-num";
        numSpan.textContent = String(cat.items.length + 1).padStart(2, "0");
        const newInput = document.createElement("input");
        newInput.className = "new-item-input";
        newInput.placeholder = "New item…";
        const commit = () => {
          const val = newInput.value.trim();
          if (val) {
            cat.items.push(val);
            scheduleSave(() => dbPatch(cat.id, { items: cat.items }));
          }
          render(); updateMeta();
        };
        newInput.onblur = commit;
        newInput.onkeydown = e => { if (e.key === "Enter") commit(); if (e.key === "Escape") render(); };
        addRow.appendChild(numSpan);
        addRow.appendChild(newInput);
        inner.appendChild(addRow);
        setTimeout(() => newInput.focus(), 10);
      };

      inner.appendChild(addBtn);
      itemList.appendChild(inner);
      right.appendChild(header);
      right.appendChild(itemList);
      row.appendChild(left);
      row.appendChild(right);
      row.onclick = () => { activeId = activeId === cat.id ? null : cat.id; render(); };
      list.appendChild(row);
    });

    updateMeta();
  }

  // ── Add category ───────────────────────────────────────────────────
  async function addCategory() {
    setStatus("saving", "Saving…");
    try {
      const row = await dbInsert({ label: "New Category", items: [], sort_order: categories.length });
      categories.push({ id: row.id, label: row.label, items: [] });
      activeId = row.id;
      render();
      setStatus("saved", "Saved");
      setTimeout(() => {
        const inputs = document.querySelectorAll(".cat-label");
        const last = inputs[inputs.length - 1];
        if (last) { last.focus(); last.select(); }
      }, 50);
    } catch (e) {
      console.error(e);
      setStatus("error", "Save failed");
    }
  }

  // ── Confirm dialog ─────────────────────────────────────────────────
  function showConfirm(label, onConfirm) {
    document.getElementById("confirm-label").textContent = label.toUpperCase();
    document.getElementById("confirm-overlay").style.display = "flex";
    document.getElementById("confirm-delete-btn").onclick = () => { closeConfirm(); onConfirm(); };
  }

  function closeConfirm() {
    document.getElementById("confirm-overlay").style.display = "none";
  }

  loadData();
</script>
</body>
</html>
